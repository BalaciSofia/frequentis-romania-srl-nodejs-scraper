name: Automation Tests

on:
  schedule:
    - cron: '0 7 * * *'
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (no deletions)'
        required: true
        default: 'true'

jobs:
  ensure-company-core:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure FREQUENTIS exists in company core
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        run: |
          EXISTING=$(curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=id:25475641&rows=1" | jq '.response.numFound')

          echo "FREQUENTIS count in company core: $EXISTING"

          if [ "$EXISTING" -eq "0" ]; then
            echo "FREQUENTIS not found - adding to company core..."
            echo '[{"id":"25475641","company":"FREQUENTIS ROMANIA SRL","brand":"FREQUENTIS","status":"activ","location":["Cluj-Napoca"],"website":["https://www.frequentis.com"],"career":["https://jobs.frequentis.com"],"lastScraped":"2026-06-03","scraperFile":"https://raw.githubusercontent.com/BalaciSofia/frequentis-romania-srl-nodejs-scraper/master/.github/workflows/scrape.yml"}]' > company_data.json

            curl -s --user "${SOLR_AUTH}" \
              "https://solr.peviitor.ro/solr/company/update/json?commit=true" \
              -X POST \
              -H "Content-Type: application/json" \
              --data-binary @company_data.json
          else
            echo "FREQUENTIS already exists in company core - no action needed"
          fi

          FINAL=$(curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=id:25475641&rows=1" | jq '.response.numFound')

          echo "FREQUENTIS count after check: $FINAL"

          if [ "$FINAL" -ge "1" ]; then
            echo "? SUCCESS: FREQUENTIS is in company core"
          else
            echo "? FAILED: FREQUENTIS still not in company core"
            exit 1
          fi

  Automation-Tests:
    runs-on: ubuntu-latest
    needs: ensure-company-core

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        run: |
          npm run test:unit
          mv test-report.html test-results-unit.html
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: test-results-unit.html
          retention-days: 30

      - name: Run Integration Tests
        run: |
          npm run test:integration
          mv test-report.html test-results-integration.html
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: test-results-integration.html
          retention-days: 30

      - name: Run E2E Tests
        run: |
          npm run test:e2e
          mv test-report.html test-results-e2e.html
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

      - name: Upload E2E Test Results
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: test-results-e2e.html
          retention-days: 30
